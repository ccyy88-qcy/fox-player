name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      run: |
        git clone https://github.com/ccyy88-qcy/fox-player.git .
        git checkout ${{ github.sha }}
    
    - name: Install JDK & Android SDK
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq openjdk-17-jdk-headless 2>&1 | tail -3
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -sL -o tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
        unzip -q tools.zip && rm tools.zip
        mv cmdline-tools latest
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5
    
    - name: Build
      run: |
        chmod +x gradlew
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
    
    - name: Upload
      if: success()
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk /tmp/app-debug.apk
    - uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: /tmp/app-debug.apk
